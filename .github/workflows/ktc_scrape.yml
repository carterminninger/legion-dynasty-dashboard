name: KTC Scraper

on:
  schedule:
    # Every 6 hours — offset from the hour to avoid GitHub's scheduled-job congestion window
    - cron: '15 */6 * * *'
  workflow_dispatch:

# Scheduled and workflow_dispatch runs push refreshed data back to the repo, which needs
# a write-scoped GITHUB_TOKEN. The repo's default token is read-only, which is why every
# scheduled run has been 403-ing at the push step (exit 128). The commit/push step below
# is gated off for pull_request events, so a PR-triggered run (should one ever be added to
# the triggers above) stays a read-only, scrape-only dry-run and never needs this scope.
permissions:
  contents: write

# A cron fire and a manual workflow_dispatch can overlap; two concurrent runs would
# race each other at the push step (non-fast-forward reject on the second push).
# Queue runs instead — cancel-in-progress stays false so a run is never killed
# mid-push.
concurrency:
  group: ktc-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Hung-runner guard (advisor review 2026-07-21, recommendation R2): without
    # this, a hung run holds the concurrency slot for GitHub's 360-minute default
    # — exactly the 6h cron cadence. Observed runtime is seconds; 10 minutes is
    # generous headroom, not a tuned constant.
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Pinned: this job carries a write-scoped token, so an unpinned install is
        # supply-chain surface. 1.2.71 is the version every green run installs —
        # read from both repos' latest green scheduled-run install logs
        # (2026-07-22 UTC) and matching the local scripts/venv, not guessed.
        run: pip install cloudscraper==1.2.71

      - name: Run KTC scraper
        run: python3 scripts/ktc_scrape.py

      - name: Validate scraped data against contract
        # Product gate (data-retrieval-loop Phase 2): a green scrape that wrote bad
        # data must not be committed. Exit 1 (contract violated) and exit 2 (could
        # not evaluate) both fail the job — fail-closed either way.
        # Bounds are EVIDENCE-BASED AS OF 2026-07-21, verified against live data:
        # exactly 500 players in every commit of both dashboards 2026-07-12→07-21,
        # sf_value aggregate-max at KTC's 9999 cap. If this starts failing on a
        # count/bound drift after a KTC page change, the bounds need
        # re-verification against live data — they are dated evidence, not
        # eternal truth.
        # Source of truth for both vendored files is ~/Projects/tools/
        # (data_contract.py + contracts/ktc_live.json); the copies under scripts/
        # are vendored byte-identical — fix upstream first, then re-vendor.
        run: python3 scripts/data_contract.py --contract scripts/contracts/ktc_live.json

      - name: Upload evidence on failure
        # Investigability: the raw fetched HTML (teed to scrape_evidence/ by
        # ktc_scrape.py) plus the rejected public/ktc_live.json, kept 7 days.
        # Fires on any earlier step's failure; caveat — if the scrape died before
        # writing output, public/ktc_live.json here is the prior committed data,
        # not rejected output (the HTML is the primary evidence in that case).
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktc-scrape-evidence-${{ github.run_id }}
          path: |
            scrape_evidence/
            public/ktc_live.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit and push if changed
        # PR runs are scrape-only dry-runs: validate the scraper without pushing (and
        # without needing a write token). schedule / workflow_dispatch runs push data.
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ktc_live.json
          # Idempotent: a no-change scrape stages nothing, so the commit is skipped and
          # the step exits 0 instead of erroring on an empty commit. A push with nothing
          # new is a no-op ("Everything up-to-date", exit 0).
          git diff --staged --quiet || git commit -m "chore: ktc data refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1260" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#0d0520" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#05080f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dac4ff"/>
      <stop offset="100%" stop-color="#7c2ff0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#05080f"/>

  <!-- Subtle purple depth glow -->
  <circle cx="256" cy="256" r="220" fill="url(#bg-glow)"/>

  <!-- LC monogram — centered, bold, gradient -->
  <text
    x="256"
    y="256"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="228"
    letter-spacing="-6"
    fill="url(#text-grad)"
  >LC</text>

  <!-- Thin accent bar under monogram -->
  <rect x="156" y="342" width="200" height="5" rx="2.5" fill="#863bff" opacity="0.6"/>
</svg>
